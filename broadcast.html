<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bol Bachan — Broadcast</title>
  <link rel="icon" type="image/svg+xml" href="./assets/img/bol-bachan-logo.svg" />
  <style>
    :root{
      --bg:#0a0a0d; --fg:#f6f6fb; --muted:#9aa0a6; --line:#2a2a33;
      --warm:linear-gradient(135deg,#dc2626,#f97316,#fbbf24);
      --a1:#dc2626; --a2:#f97316; --b1:#118ab2; --b2:#06d6a0; --gold:#fbbf24;
      --font:"Poppins","Segoe UI",system-ui,sans-serif;
    }
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap');
    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; background:radial-gradient(1600px 800px at 50% -10%,#1b1b26,var(--bg) 62%);
      color:var(--fg); font-family:var(--font); overflow:hidden; }
    .wrap{ height:100vh; display:flex; flex-direction:column; padding:2.2vh 2.4vw; }

    header{ display:flex; align-items:center; gap:1.2vw; }
    header img{ height:6.2vh; }
    .rlabel{ flex:1; text-align:center; font-weight:800; letter-spacing:2px; color:var(--gold);
      font-size:2.4vh; text-transform:uppercase; }
    .live{ display:flex; align-items:center; gap:.6vw; font-weight:800; font-size:2vh; color:#fff;
      background:rgba(220,38,38,.9); padding:.7vh 1.4vw; border-radius:999px; }
    .live .dot{ width:1.3vh; height:1.3vh; border-radius:50%; background:#fff; animation:blink 1s infinite; }

    .stage{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:0; gap:2.4vh; }

    .prompt{ font-size:4.4vh; font-weight:800; text-align:center; max-width:88vw; line-height:1.2; }
    .prompt .blank{ color:var(--gold); }

    .duel{ display:grid; grid-template-columns:1fr 1fr; gap:2.2vw; width:92vw; }
    .panel{ border-radius:2vh; padding:3vh 2vw; border:.5vh solid transparent; position:relative;
      display:flex; flex-direction:column; gap:2vh; min-height:34vh; justify-content:center; transition:.3s; }
    .panel.A{ background:linear-gradient(135deg,rgba(220,38,38,.20),rgba(249,115,22,.12)); border-color:var(--a1); }
    .panel.B{ background:linear-gradient(135deg,rgba(17,138,178,.20),rgba(6,214,160,.12)); border-color:var(--b1); }
    .panel.win{ box-shadow:0 0 0 .6vh var(--gold); }
    .panel.lose{ opacity:.45; }
    .who{ font-size:2.2vh; font-weight:800; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
    .atext{ font-size:4vh; font-weight:800; line-height:1.15; }
    .barwrap{ height:3.4vh; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
    .barfill{ height:100%; width:0%; border-radius:999px; transition:width .5s ease; }
    .A .barfill{ background:linear-gradient(90deg,var(--a1),var(--a2)); }
    .B .barfill{ background:linear-gradient(90deg,var(--b1),var(--b2)); }
    .count{ font-size:3.4vh; font-weight:900; }
    .ribbon{ position:absolute; top:-2vh; right:-1vw; background:var(--gold); color:#1a1206; font-weight:900;
      padding:.6vh 1.4vw; border-radius:1vh; font-size:2vh; display:none; letter-spacing:1px; }
    .panel.win .ribbon{ display:block; }
    .hint{ color:var(--muted); font-size:3vh; font-weight:700; }

    .bigLogo{ width:min(46vw,60vh); filter:drop-shadow(0 3vh 6vh rgba(220,38,38,.4)); }
    .soon{ font-size:4vh; font-weight:900; letter-spacing:3px; background:var(--warm);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }

    .board{ width:64vw; display:flex; flex-direction:column; gap:1.4vh; }
    .sbTitle{ font-size:4vh; font-weight:900; background:var(--warm); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .srow{ display:flex; align-items:center; gap:1.2vw; }
    .srow .nm{ width:26%; font-weight:800; font-size:2.6vh; text-align:right; white-space:nowrap; }
    .srow .track{ flex:1; height:3.6vh; background:rgba(255,255,255,.08); border-radius:999px; overflow:hidden; }
    .srow .fill{ height:100%; background:var(--warm); border-radius:999px; transition:width .6s ease; }
    .srow .pts{ width:12%; font-weight:900; font-size:2.6vh; }
    .srow.lead .nm{ color:var(--gold); }

    .trophy{ font-size:16vh; animation:bounce 1.1s infinite; }
    .champ{ font-size:6vh; font-weight:900; background:var(--warm); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .champsub{ font-size:3vh; color:var(--muted); }

    footer{ text-align:center; padding-top:1.6vh; }
    .join{ display:inline-block; background:rgba(0,0,0,.5); border:1px solid var(--line); border-radius:999px;
      padding:1.2vh 2.2vw; font-size:2.2vh; font-weight:700; color:var(--fg); }
    .join b{ color:var(--gold); }

    .hidden{ display:none !important; }
    .confetti{ position:fixed; inset:0; pointer-events:none; overflow:hidden; }
    .confetti i{ position:absolute; top:-2vh; width:.7vw; height:1.6vh; opacity:.9; animation:fall linear forwards; }
    @keyframes blink{ 0%,100%{opacity:1} 50%{opacity:.25} }
    @keyframes bounce{ 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3vh)} }
    @keyframes fall{ to{ transform:translateY(112vh) rotate(720deg); } }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <img src="./assets/img/bol-bachan-logo.svg" alt="Bol Bachan" onerror="this.style.display='none'"/>
      <div class="rlabel" id="rlabel">Bol Bachan</div>
      <div class="live"><span class="dot"></span> LIVE</div>
    </header>

    <div class="stage">
      <!-- idle -->
      <div id="vIdle">
        <img class="bigLogo" src="./assets/img/bol-bachan-logo.svg" alt="Bol Bachan" onerror="this.style.display='none'"/>
        <div class="soon" style="text-align:center; margin-top:2vh;">STARTING SOON…</div>
      </div>

      <!-- prompt / vote / reveal -->
      <div id="vDuel" class="hidden" style="display:flex; flex-direction:column; align-items:center; gap:2.4vh; width:100%;">
        <div class="prompt" id="dPrompt">—</div>
        <div id="dHint" class="hint hidden">Answers coming in…</div>
        <div class="duel" id="dPanels">
          <div class="panel A" id="pA">
            <div class="ribbon">WINNER</div>
            <div class="who" id="aWho">Player A</div>
            <div class="atext" id="aText">—</div>
            <div class="barwrap"><div class="barfill" id="aBar"></div></div>
            <div class="count" id="aCount">0</div>
          </div>
          <div class="panel B" id="pB">
            <div class="ribbon">WINNER</div>
            <div class="who" id="bWho">Player B</div>
            <div class="atext" id="bText">—</div>
            <div class="barwrap"><div class="barfill" id="bBar"></div></div>
            <div class="count" id="bCount">0</div>
          </div>
        </div>
      </div>

      <!-- scoreboard -->
      <div id="vBoard" class="hidden board">
        <div class="sbTitle" id="sbTitle">Scores</div>
        <div id="sbRows"></div>
      </div>

      <!-- finale -->
      <div id="vFinale" class="hidden" style="display:flex; flex-direction:column; align-items:center; gap:1.2vh;">
        <div class="trophy">🏆</div>
        <div class="champ" id="champName">Champion</div>
        <div class="champsub" id="champSub"></div>
      </div>
    </div>

    <footer>
      <span class="join" id="joinBar">📺 Watch &amp; play along — <b id="joinText">bol-bachan.vercel.app</b></span>
    </footer>
  </div>
  <div class="confetti" id="confetti"></div>

  <script>
  (function(){
    const $=id=>document.getElementById(id);
    // Edit this to your play-along / channel handle shown on the lower third:
    const JOIN_TEXT = 'bol-bachan.vercel.app';
    $('joinText').textContent = JOIN_TEXT;

    const views = { idle:$('vIdle'), duel:$('vDuel'), board:$('vBoard'), finale:$('vFinale') };
    function showView(name){ Object.keys(views).forEach(k=> views[k].classList.toggle('hidden', k!==name)); }

    function fmtPrompt(p){ return (p||'').replace('___','<span class="blank">______</span>'); }
    function pct(a,b){ const t=a+b; return t? Math.round(a/t*100):50; }

    let lastFinale=false;
    function render(d){
      // header label
      if(d.view==='idle'){ $('rlabel').textContent='Bol Bachan'; }
      else if(d.view==='finale'){ $('rlabel').textContent='Best of the Night'; }
      else { $('rlabel').textContent='Round '+d.round+' · Matchup '+d.matchupIn; }

      if(d.view==='idle' || d.view==='lobby'){ showView('idle'); lastFinale=false; return; }

      if(d.view==='prompt' || d.view==='vote' || d.view==='reveal'){
        showView('duel'); lastFinale=false;
        $('dPrompt').innerHTML=fmtPrompt(d.prompt);
        const isPrompt = (d.view==='prompt');
        $('dHint').classList.toggle('hidden', !isPrompt);
        $('dPanels').style.opacity = isPrompt ? '0.25' : '1';
        $('aWho').textContent=d.aName||'Player A'; $('bWho').textContent=d.bName||'Player B';
        $('aText').textContent = isPrompt ? '???' : (d.aText||'—');
        $('bText').textContent = isPrompt ? '???' : (d.bText||'—');
        const a=d.votesA||0, b=d.votesB||0;
        $('aCount').textContent=a; $('bCount').textContent=b;
        $('aBar').style.width=pct(a,b)+'%'; $('bBar').style.width=pct(b,a)+'%';
        const rev = (d.view==='reveal');
        const aWin = a>=b;
        $('pA').classList.toggle('win', rev && aWin); $('pA').classList.toggle('lose', rev && !aWin);
        $('pB').classList.toggle('win', rev && !aWin); $('pB').classList.toggle('lose', rev && aWin);
        return;
      }

      if(d.view==='scoreboard'){
        showView('board'); lastFinale=false;
        $('sbTitle').textContent='After Round '+d.round;
        renderRows(d.scores);
        return;
      }

      if(d.view==='finale'){
        showView('finale');
        const w=(d.scores&&d.scores[0])||{name:'Champion',score:0};
        $('champName').textContent='👑 '+w.name;
        $('champSub').textContent='Best of the Night · '+w.score+' points';
        if(!lastFinale){ burst(160); lastFinale=true; }
        return;
      }
    }

    function renderRows(scores){
      const rows=$('sbRows'); rows.innerHTML='';
      const max=Math.max(1, ...(scores||[]).map(s=>s.score));
      (scores||[]).forEach((s,i)=>{
        const d=document.createElement('div'); d.className='srow'+(i===0?' lead':'');
        d.innerHTML='<div class="nm">'+(i===0?'👑 ':'')+s.name+'</div>'+
          '<div class="track"><div class="fill" style="width:'+Math.round(s.score/max*100)+'%"></div></div>'+
          '<div class="pts">'+s.score+'</div>';
        rows.appendChild(d);
      });
    }

    function burst(n){ const w=$('confetti'), c=['#dc2626','#f97316','#fbbf24','#06d6a0','#f6f6fb'];
      for(let i=0;i<n;i++){ const s=document.createElement('i'); s.style.left=Math.random()*100+'vw';
        s.style.background=c[i%c.length]; s.style.animationDuration=(2.6+Math.random()*2.6)+'s';
        s.style.animationDelay=(Math.random()*.7)+'s'; s.style.transform='rotate('+Math.random()*360+'deg)';
        w.appendChild(s); setTimeout(()=>s.remove(),6500); } }

    // sync with the game (same browser, other tab/window)
    if('BroadcastChannel' in window){
      const bc=new BroadcastChannel('bolbachan');
      bc.onmessage=e=>{ if(e.data && e.data.t==='state') render(e.data); };
      bc.postMessage({ t:'hello' });   // ask the game for the current state
    } else {
      $('rlabel').textContent='BroadcastChannel unsupported — use a modern browser';
    }
  })();
  </script>
</body>
</html>
