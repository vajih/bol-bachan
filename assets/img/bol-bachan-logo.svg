<svg viewBox="0 0 520 270" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bol Bachan">
  <defs>
    <linearGradient id="bbWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dc2626"/>
      <stop offset="0.55" stop-color="#f97316"/>
      <stop offset="1" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="bbCool" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#118ab2"/>
      <stop offset="1" stop-color="#06d6a0"/>
    </linearGradient>
    <filter id="bbShadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- emblem: the head-to-head answer duel -->
  <g filter="url(#bbShadow)">
    <!-- back bubble (cool / Team B) -->
    <g transform="rotate(8 300 80)">
      <rect x="252" y="40" width="104" height="78" rx="22" fill="url(#bbCool)"/>
      <polygon points="276,112 308,112 270,140" fill="url(#bbCool)"/>
      <circle cx="282" cy="80" r="7.5" fill="#ffffff" opacity="0.92"/>
      <circle cx="306" cy="80" r="7.5" fill="#ffffff" opacity="0.92"/>
      <circle cx="330" cy="80" r="7.5" fill="#ffffff" opacity="0.92"/>
    </g>
    <!-- front bubble (warm / Team A) -->
    <g transform="rotate(-7 230 72)">
      <rect x="176" y="34" width="116" height="84" rx="24" fill="url(#bbWarm)"/>
      <polygon points="206,110 240,110 196,140" fill="url(#bbWarm)"/>
      <circle cx="208" cy="76" r="8.5" fill="#ffffff"/>
      <circle cx="234" cy="76" r="8.5" fill="#ffffff"/>
      <circle cx="260" cy="76" r="8.5" fill="#ffffff"/>
    </g>
  </g>
  <!-- sparkle -->
  <polygon points="356,26 361,45 380,50 361,55 356,74 351,55 332,50 351,45" fill="#fbbf24"/>

  <!-- wordmark -->
  <text x="260" y="198" text-anchor="middle" font-family="Poppins, 'Segoe UI', system-ui, sans-serif"
        font-weight="900" font-size="62" letter-spacing="1.5" fill="url(#bbWarm)">BOL BACHAN</text>

  <!-- tagline pill -->
  <rect x="195" y="218" width="130" height="34" rx="17" fill="none" stroke="#fbbf24" stroke-width="2"/>
  <text x="260" y="241" text-anchor="middle" font-family="Poppins, 'Segoe UI', system-ui, sans-serif"
        font-weight="700" font-size="16" letter-spacing="3" fill="#fbbf24">BOLO ZARA!</text>
</svg>
